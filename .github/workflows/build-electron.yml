name: Release Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  package:
    name: Package ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS
            script: pack:mac
          - os: windows-latest
            label: Windows
            script: pack:win
          - os: ubuntu-latest
            label: Linux
            script: pack:linux
    defaults:
      run:
        working-directory: vue-snake
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: vue-snake/package-lock.json

      - name: Validate release tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          RELEASE_TAG_NAME: ${{ github.ref_name }}
        run: node ./scripts/validate-release-version.cjs

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build distributable
        run: npm run ${{ matrix.script }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: snake-game-release-${{ runner.os }}
          path: |
            vue-snake/dist/*.dmg
            vue-snake/dist/*.pkg
            vue-snake/dist/*.exe
            vue-snake/dist/*.AppImage
            vue-snake/dist/*.deb
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: snake-game-release-*
          path: release-artifacts
          merge-multiple: true

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          name: Snake Game ${{ github.ref_name }}
          body: |
            ## Introduction

            Snake Game is a classic Snake desktop app built with Vue, Electron, and local AI modes.

            This release contains the latest packaged builds for macOS, Windows, and Linux.
          generate_release_notes: true
          files: |
            release-artifacts/*.dmg
            release-artifacts/*.pkg
            release-artifacts/*.exe
            release-artifacts/*.AppImage
            release-artifacts/*.deb
