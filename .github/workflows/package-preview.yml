name: Package Preview

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  package:
    name: Package ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS
            script: pack:mac
          - os: windows-latest
            label: Windows
            script: pack:win
          - os: ubuntu-latest
            label: Linux
            script: pack:linux
    defaults:
      run:
        working-directory: vue-snake
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: vue-snake/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build distributable
        run: npm run ${{ matrix.script }}

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vue-snake-preview-${{ runner.os }}
          path: |
            vue-snake/dist/*.dmg
            vue-snake/dist/*.pkg
            vue-snake/dist/*.exe
            vue-snake/dist/*.AppImage
            vue-snake/dist/*.deb
          if-no-files-found: error
