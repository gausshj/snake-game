name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  vue-tests:
    name: Vue Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vue-snake
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: vue-snake/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests with coverage
        run: npm run test:coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./vue-snake/lcov.info
          flags: frontend
          fail_ci_if_error: true
          verbose: true

  cpp-tests:
    name: C++ Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cpp
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run logic tests
        run: make test
