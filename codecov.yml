codecov:
  require_ci_to_pass: true

github_checks:
  annotations: true

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
        if_ci_failed: error
        if_not_found: failure
        informational: false
    patch:
      default:
        target: auto
        threshold: 1%
        if_ci_failed: error
        if_not_found: failure
        informational: false

comment:
  layout: "reach,diff,files"
  require_changes: true

fixes:
  - "::vue-snake/"

ignore:
  - "vue-snake/src/game/*.generated.ts"
